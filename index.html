<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedra Papel Tesoura</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
        }

        .score {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .score h2 {
            margin-bottom: 10px;
        }

        .score p {
            font-size: 2rem;
            font-weight: bold;
        }

        .arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .fighter {
            flex: 1;
            min-width: 250px;
            text-align: center;
        }

        .fighter svg {
            width: 140px;
            height: 140px;
            margin-bottom: 10px;
        }

        .fighter p {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .vs {
            font-size: 2rem;
            font-weight: bold;
            color: #38bdf8;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            min-width: 150px;
        }

        .choice-btn:hover {
            transform: translateY(-8px) scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }

        .choice-btn svg {
            width: 90px;
            height: 90px;
            margin-bottom: 10px;
        }

        .choice-btn span {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .result {
            margin-top: 35px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            min-height: 40px;
        }
    </style>
</head>

<body>

    <div class="game">

        <h1>✊ Pedra Papel Tesoura ✋</h1>

        <!-- PLACAR -->
        <div class="scoreboard">

            <div class="score">
                <h2>Jogador</h2>
                <p id="playerScore">0</p>
            </div>

            <div class="score">
                <h2>CPU</h2>
                <p id="enemyScore">0</p>
            </div>

        </div>

        <!-- ARENA -->
        <div class="arena">

            <!-- JOGADOR -->
            <div class="fighter">

                <h2>Você</h2>

                <!-- personagem -->
                <svg viewBox="0 0 200 200">

                    <circle cx="100" cy="60" r="40" fill="#38bdf8" />

                    <rect x="65" y="105" width="70" height="70" rx="10" fill="#38bdf8" />

                </svg>

                <p id="playerChoice">?</p>

            </div>

            <div class="vs">VS</div>

            <!-- INIMIGO -->
            <div class="fighter">

                <h2>CPU</h2>

                <!-- inimigo -->
                <svg viewBox="0 0 200 200">

                    <circle cx="100" cy="60" r="40" fill="#ef4444" />

                    <polygon points="60,180 140,180 100,100" fill="#ef4444" />

                </svg>

                <p id="enemyChoice">?</p>

            </div>

        </div>

        <!-- ESCOLHAS -->
        <div class="choices">

            <!-- PEDRA -->
            <button class="choice-btn" onclick="play('pedra')">

                <svg viewBox="0 0 120 120">

                    <ellipse cx="60" cy="95" rx="30" ry="10" fill="rgba(0,0,0,0.15)" />

                    <rect x="28" y="40" width="64" height="45" rx="16" fill="#FACC15" />

                    <rect x="28" y="24" width="13" height="22" rx="6" fill="#FBBF24" />

                    <rect x="43" y="20" width="13" height="26" rx="6" fill="#FBBF24" />

                    <rect x="58" y="20" width="13" height="26" rx="6" fill="#FBBF24" />

                    <rect x="73" y="24" width="13" height="22" rx="6" fill="#FBBF24" />

                    <rect x="15" y="48" width="20" height="16" rx="8" fill="#EAB308" />

                </svg>

                <span>Pedra</span>

            </button>

            <!-- PAPEL -->
            <button class="choice-btn" onclick="play('papel')">

                <svg viewBox="0 0 120 120">

                    <ellipse cx="60" cy="102" rx="26" ry="8" fill="rgba(0,0,0,0.15)" />

                    <rect x="35" y="42" width="50" height="50" rx="12" fill="#FACC15" />

                    <rect x="35" y="5" width="10" height="45" rx="5" fill="#FBBF24" />

                    <rect x="48" y="0" width="10" height="50" rx="5" fill="#FBBF24" />

                    <rect x="61" y="0" width="10" height="50" rx="5" fill="#FBBF24" />

                    <rect x="74" y="5" width="10" height="45" rx="5" fill="#FBBF24" />

                    <rect x="20" y="52" width="20" height="12" rx="6" transform="rotate(-25 20 52)" fill="#EAB308" />

                </svg>

                <span>Papel</span>

            </button>

            <!-- TESOURA -->
            <button class="choice-btn" onclick="play('tesoura')">

                <svg viewBox="0 0 120 120">

                    <ellipse cx="60" cy="100" rx="26" ry="8" fill="rgba(0,0,0,0.15)" />

                    <rect x="38" y="5" width="12" height="60" rx="6" transform="rotate(-10 38 5)" fill="#FBBF24" />

                    <rect x="68" y="5" width="12" height="60" rx="6" transform="rotate(10 68 5)" fill="#FBBF24" />

                    <rect x="38" y="52" width="45" height="38" rx="12" fill="#FACC15" />

                    <rect x="48" y="45" width="10" height="20" rx="5" fill="#EAB308" />

                    <rect x="60" y="45" width="10" height="20" rx="5" fill="#EAB308" />

                    <rect x="24" y="58" width="18" height="12" rx="6" fill="#CA8A04" />

                </svg>

                <span>Tesoura</span>

            </button>

        </div>

        <!-- RESULTADO -->
        <div class="result" id="result">
            Escolha uma opção
        </div>

    </div>

    <script>

        let playerScore = 0;
        let enemyScore = 0;

        const choices = ["pedra", "papel", "tesoura"];

        function play(playerChoice) {

            const enemyChoice =
                choices[Math.floor(Math.random() * choices.length)];

            document.getElementById("playerChoice").innerText =
                playerChoice;

            document.getElementById("enemyChoice").innerText =
                enemyChoice;

            let result = "";

            if (playerChoice === enemyChoice) {

                result = "Empate!";

            }
            else if (
                (playerChoice === "pedra" && enemyChoice === "tesoura") ||
                (playerChoice === "papel" && enemyChoice === "pedra") ||
                (playerChoice === "tesoura" && enemyChoice === "papel")
            ) {

                result = "Você venceu!";
                playerScore++;

            }
            else {

                result = "Você perdeu!";
                enemyScore++;

            }

            document.getElementById("playerScore").innerText =
                playerScore;

            document.getElementById("enemyScore").innerText =
                enemyScore;

            document.getElementById("result").innerText =
                result;
        }

    </script>

</body>

</html>
